name: xemora-re3
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  - pip
  - samtools=1.18
  - htslib=1.18
  - libdeflate
  - libzlib
  - libcurl
  - openssl
  - ncurses
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - biopython
  # optional: if you like having a CUDA runtime present from conda; OK to omit
  # - cuda-runtime=12.1
  - pip:
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.3.*           # cu121 wheel (works with your 535 driver)
      - torchvision==0.18.*    # optional
      - ont-remora>=3.0
      - pod5
      - ont-fast5-api
      - tqdm
      - more-itertools
      - networkx
      - alive-progress
      - about-time

