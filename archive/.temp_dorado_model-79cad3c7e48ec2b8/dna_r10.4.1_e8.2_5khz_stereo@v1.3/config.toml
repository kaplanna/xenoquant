[model]
package = "bonito.crf"

[labels]
labels = [ "N", "A", "C", "G", "T",]

[input]
features = 13
feature_list = [ "padded_template_signal", "padded_complement_signal", "padded_template_sequence_onehot", "padded_complement_sequence_onehot", "padded_template_movetable", "padded_template_quality", "padded_complement_quality",]

[global_norm]
state_len = 4

[encoder]
activation = "swish"
first_conv_size = 16
stride = 5
rnn_type = "lstm"
features = 384
scale = 5.0
winlen = 19
blank_score = 2.0

[run_info]
sample_rate = 5000
sample_type = "dna"

[scaling]
strategy = "pa"

[standardisation]
standardise = 1
mean = 93.69239463939118
stdev = 23.506745239082388

[qscore]
scale = 0.74
bias = 1.8